# markgate configuration — https://github.com/go-to-k/markgate
#
# Gates back the pre-commit / pre-PR / pre-merge checks (mirrors cdk-local's
# layout). cdk-real-drift is READ-ONLY against AWS (no destroy path, no schema
# migration), so cdkd's destroy / broad / schema-migration gates are not needed.
#
# Gates:
#   check     — typecheck (tsgo) / lint+fmt (vp check) / build / unit tests
#               (set by /check and /verify-pr).
#   docs      — README / DESIGN / docs consistency with src
#               (set by /check-docs and /verify-pr).
#   verify-pr — full PR-readiness checklist; AND of check + docs.
#   pr-review — `/review-pr` reviewer-dispatch verification (sha-bound).
#   integ     — real-AWS verification (deploy/check/inject-drift/destroy) with
#               zero orphan resources. 14d TTL — AWS-side wire-format + Cloud
#               Control behavior drift over time even when the repo doesn't.
#
# NOTE: the commit/PR-blocking ENFORCEMENT (the .claude hooks that call markgate)
# is intentionally not installed yet — it depends on the companion skills
# (/check, /verify-pr, /run-integ) and a PR workflow. CI (.github/workflows/ci.yml)
# enforces typecheck/lint/build/test on every push + PR in the meantime.

gates:
  check:
    hash: files
    include:
      - "src/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "vite.config.ts"

  docs:
    hash: files
    include:
      - "src/**"
      - "docs/**"
      - "README.md"
      - "DESIGN.md"

  verify-pr:
    requires: [check, docs]

  pr-review:
    hash: files
    include:
      - ".markgate-pr-review-sha"

  integ:
    hash: files
    ttl: 14d
    include:
      - "src/**"
      - "tests/integration/**"
