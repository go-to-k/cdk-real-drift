name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version: '24'
          cache: true
          run-install: false

      - run: vp install --frozen-lockfile
      # Run lint/format via `vp check` and REDIRECT its output to a file, printing it only
      # on failure. `vp check` (the Rust oxc tool) PANICS while writing its large warning
      # output to CI's non-blocking stdout pipe:
      #   Vite+ panicked … failed printing to stdout: Resource temporarily unavailable (os error 11)
      # Once main's lint output grew to ~109 warnings this turned main + every PR red (as
      # `vp run check` exit 134 / bare `vp check` exit 1) even though the check itself finds
      # 0 ERRORS — warnings are advisory, not failures. Writing to a regular FILE is blocking
      # I/O, so the EAGAIN that triggers the panic never happens; the warnings are captured
      # but only surfaced when the check actually fails. `vp check` still exits non-zero on a
      # real lint/format ERROR, which we propagate. (Upstream Vite+ stdout-panic bug — the
      # tool itself prints "This is a bug in Vite+, not your code".)
      - run: vp check >vpcheck.log 2>&1 || { cat vpcheck.log; exit 1; }
      # Build BEFORE test: tests/json-empty-on-error.test.ts (#943/#988/#989) spawns the
      # built `dist/cli.js` end to end, so `dist/` must exist when `vp run test` runs. The
      # old order (test before build) left dist absent/stale and the spawned CLI exited 1
      # ("Cannot find module") — 9 false failures on main only, green in local gates that
      # `vp pack` first (#987-era CI red). `vp run build` is uncached (vite.config.ts), so
      # this always rebuilds — no stale-dist replay.
      - run: vp run build
      - run: vp run test

      # go-to-k/cdk-local#402 diagnostics (upstream Vite+ forks-pool crash, NOT a
      # cdk-real-drift issue): if a forks worker crashed ("Worker exited
      # unexpectedly"), Node's --report-on-fatalerror / --report-uncaught-exception
      # (armed in vite.config.ts) wrote a report.*.json with the native + JS
      # stack and open libuv handles. Dump any report to the log on failure so
      # the next crash pinpoints the offending native handle. No-op on success.
      - name: Dump Node diagnostic reports (on failure)
        if: failure()
        run: |
          shopt -s nullglob
          found=0
          for f in report.*.json; do
            found=1
            echo "::group::$f"
            cat "$f"
            echo "::endgroup::"
          done
          [ "$found" = 0 ] && echo "No Node diagnostic report written (worker did not hit a fatal/uncaught crash)."
          exit 0

  runtime-compat:
    runs-on: ubuntu-latest
    needs: check-build-test
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version: '24'
          cache: true
          run-install: false

      - run: vp install --frozen-lockfile
      - run: vp run build
      - run: vp env exec --node ${{ matrix.node-version }} node dist/cli.js --version
